<div class="container mt-4">
  <h2 class="mb-4 text-center">📊 Mi Resumen Nutricional</h2>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0 p-4">
        <h5 class="text-center mb-3">Distribución de Macronutrientes</h5>
        
        <canvas baseChart
          [data]="pieChartData"
          [type]="pieChartType"
          [options]="pieChartOptions">
        </canvas>

        <div class="mt-4 text-center">
          <p class="text-muted small">Datos basados en los alimentos añadidos hoy al diario.</p>
        </div>
      </div>
    </div>
  </div>
</div>
