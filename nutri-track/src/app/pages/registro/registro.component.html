<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0 rounded-4" style="max-width: 450px; width: 100%;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
          <i class="bi bi-person-plus text-primary fs-1"></i>
        </div>
        <h2 class="fw-bold">Crear Cuenta</h2>
        <p class="text-muted">Únete a Nutri-Track y empieza hoy</p>
      </div>

      <form (submit)="onRegistro()">
        <div class="mb-3">
          <label class="form-label small fw-bold" for="reg-name">Nombre Completo</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
            <input type="text" id="reg-name" name="name" [(ngModel)]="usuario.name"
                   class="form-control bg-light border-start-0" placeholder="Ej: Juan Pérez" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label small fw-bold" for="reg-email">Correo Electrónico</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
            <input type="email" id="reg-email" name="email" [(ngModel)]="usuario.email"
                   class="form-control bg-light border-start-0" placeholder="tu@email.com" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold" for="reg-password">Contraseña (min. 6 caracteres)</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
            <input type="password" id="reg-password" name="password" [(ngModel)]="usuario.password"
                   class="form-control bg-light border-start-0" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold shadow-sm">
          Registrarme ahora <i class="bi bi-check-circle ms-2"></i>
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="small text-muted">¿Ya tienes cuenta? 
          <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Inicia sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>
