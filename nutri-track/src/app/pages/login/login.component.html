<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0 rounded-4" style="max-width: 400px; width: 100%;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="bg-success bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
          <i class="bi bi-person-lock text-success fs-1"></i>
        </div>
        <h2 class="fw-bold">Bienvenido</h2>
        <p class="text-muted">Entra para gestionar tu diario</p>
      </div>

      <form (submit)="onLogin()">
        <div class="mb-3">
          <label class="form-label small fw-bold" for="login-email">Correo Electrónico</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
            <input type="email" id="login-email" name="email" [(ngModel)]="credenciales.email"
                   class="form-control bg-light border-start-0" placeholder="tu@email.com" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold" for="login-password">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
            <input type="password" id="login-password" name="password" [(ngModel)]="credenciales.password"
                   class="form-control bg-light border-start-0" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100 py-2 rounded-pill fw-bold shadow-sm">
          Iniciar Sesión <i class="bi bi-arrow-right ms-2"></i>
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="small text-muted">¿No tienes cuenta? 
          <a routerLink="/registro" class="text-success fw-bold text-decoration-none">Regístrate</a>
        </p>
      </div>
    </div>
  </div>
</div>
