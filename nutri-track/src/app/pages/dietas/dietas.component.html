<div class="container mt-4">
  <div class="text-center mb-5">
    <h2 class="fw-bold"><i class="bi bi-funnel me-2 text-success"></i>Preferencias de Dieta</h2>
    <p class="text-muted">Selecciona tu perfil para que el buscador te avise de ingredientes no aptos.</p>
  </div>

  <div class="row row-cols-1 row-cols-md-2 g-4 justify-content-center max-w-75 mx-auto">
    
    <div class="col" *ngFor="let dieta of opcionesDietas">
      <div class="card h-100 shadow-sm text-center" 
           style="cursor: pointer; transition: all 0.3s ease;"
           [ngClass]="{'border-success bg-success text-white': dietaActual === dieta.id, 'border-0': dietaActual !== dieta.id}"
           (click)="seleccionarDieta(dieta.id)">
        
        <div class="card-body p-4">
          <i class="bi {{ dieta.icono }} display-4 mb-3 d-block"></i>
          <h4 class="card-title fw-bold">{{ dieta.titulo }}</h4>
          <p class="card-text opacity-75 small">{{ dieta.desc }}</p>

          <div *ngIf="dieta.excluye.length > 0" class="mt-3">
            <small class="d-block mb-2 opacity-50 fw-bold text-uppercase" style="font-size: 0.65rem; letter-spacing: 0.05em;">Descarta</small>
            <div class="d-flex flex-wrap gap-1 justify-content-center">
              <span *ngFor="let e of dieta.excluye" class="badge small"
                    [ngClass]="dietaActual === dieta.id
                      ? 'bg-white bg-opacity-25 text-white border border-white border-opacity-25'
                      : 'bg-danger bg-opacity-10 text-danger'">
                {{ e }}
              </span>
            </div>
          </div>

          <div *ngIf="dieta.excluye.length === 0" class="mt-3">
            <span class="badge small"
                  [ngClass]="dietaActual === dieta.id ? 'bg-white bg-opacity-25 text-white' : 'bg-success bg-opacity-10 text-success'">
              <i class="bi bi-check-circle me-1"></i>Todas las recetas son aptas
            </span>
          </div>

          <i class="bi bi-check-circle-fill fs-3 mt-3 d-block" *ngIf="dietaActual === dieta.id"></i>
        </div>

      </div>
    </div>

  </div>
</div>
